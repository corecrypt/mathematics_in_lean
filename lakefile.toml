name = "mil"
defaultTargets = ["MIL", "MySolutions"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
relaxedAutoImplicit = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "v4.21.0"

[[lean_lib]]
name = "MIL"

[[lean_lib]]
name = "my_solutions"